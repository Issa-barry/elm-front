<div class="resize-container-landing2 bg-surface-0 light:bg-surface-950 min-h-screen">
            
            <div class="bg-surface-0 dark:bg-surface-900 p-20 flex flex-col items-center gap-12">
                <div class="flex flex-col gap-4 text-center">
                    <div class="text-primary text-xl font-semibold leading-tight">Growth Insights</div>
                    <div class="text-surface-900 dark:text-surface-0 text-4xl font-bold leading-tight">Take your vision to the next level</div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 w-full justify-center">
                    @for (item of stats; track item.label; let index = $index) {
                        <div class="p-8 bg-primary-50/50 dark:bg-primary-400/10 rounded-2xl flex flex-col items-center gap-4">
                            <i [class]="item.icon" class="text-4xl! text-primary"></i>
                            <div class="flex flex-col gap-2">
                                <div class="text-surface-900 dark:text-surface-0 text-3xl font-medium leading-tight text-center">
                                    {{ item.value }}
                                </div>
                                <div class="text-primary-600 dark:text-primary-400 text-lg font-medium leading-normal text-center">
                                    {{ item.label }}
                                </div>
                            </div>
                        </div>
                    }
                </div>
            </div>
            <div class="bg-surface-50 dark:bg-surface-950 px-6 py-20 md:px-12 lg:px-20">
                <div
                    style="background: radial-gradient(1130.92% 141.42% at 100% 0%, color-mix(in srgb, var(--p-primary-color), transparent 40%) 0%, var(--p-surface-950) 100%), #18181b"
                    class="flex flex-wrap relative overflow-hidden rounded-2xl"
                >
                    <div class="px-12 py-20">
                        <span class="uppercase text-lg text-primary-300 font-bold">BE ONE OF THE FIRSTS</span>
                        <div class="text-surface-0 text-4xl font-medium mt-4 mb-8 leading-tight">Join the waitlist today!</div>
                        <p-button type="button" label="Reserve Your Username" [rounded]="true" styleClass="px-3! py-2! text-base! font-medium!"></p-button>
                    </div>

                    <img
                        src="https://fqjltiegiezfetthbags.supabase.co/storage/v1/render/image/public/block.images/blocks/cta/mockup.png"
                        alt="Image"
                        class="static lg:absolute block mx-auto max-w-full h-auto lg:h-[28.57rem] -top-8 -right-4"
                    />
                </div>
            </div>
            
             
        </div>
