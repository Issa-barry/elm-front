@if (isMobile()) {
    <!-- Composant mobile dédié — layout slider + modules shortcuts -->
    <app-finance-mobile
        [period]="encaissementPeriod"
        (periodChange)="onEncaissementPeriodChange($event)"
    />
} @else {
    <!-- Layout desktop : inchangé -->
    <div class="grid grid-cols-12 gap-8">
        <app-header-widget2
            class="col-span-12"
            [period]="encaissementPeriod"
            (periodChange)="onEncaissementPeriodChange($event)"
        />
        <app-encaissement-widget [period]="encaissementPeriod" />

        <div class="col-span-12 xl:col-span-12">
            <app-bar-widget />
        </div>

        <div class="col-span-12 xl:col-span-6">
            <app-doughnut-widget />
        </div>

        <div class="col-span-12 lg:col-span-6">
            <app-ca-par-statut-widget />
        </div>

        <!-- <div class="col-span-12 xl:col-span-12">
            <app-vehicule-widget />
        </div> -->

        <!-- <div class="col-span-12 xl:col-span-4">
            <app-recent-transactions-widget />
        </div>

        <div class="col-span-12 lg:col-span-6">
            <app-recent-transactions-two-widget />
        </div> -->
    </div>
}
