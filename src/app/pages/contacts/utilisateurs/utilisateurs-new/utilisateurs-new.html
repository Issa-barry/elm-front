<p-toast></p-toast>

<div class="edit-page">
  <header class="edit-mobile-header"> 
    <button
      type="button"
      class="edit-back"
      aria-label="Retour à la liste"
      (click)="onCancel()"
    >
      <i class="pi pi-arrow-left"></i>
    </button>
    <h1 class="edit-title">Nouvel utilisateur</h1>
    <span class="edit-header-spacer"></span>
  </header>

  <!-- Rappel UX : usine d'assignation ou message vue consolidée -->
  @if (usineContext.isConsolidated()) {
    <p-message
      severity="warn"
      styleClass="usine-context-message mb-3"
      [text]="'Veuillez sélectionner une usine dans la barre du haut pour pouvoir créer un utilisateur.'"
    />
  } @else if (usineContext.currentUsine(); as usine) {
    <div class="usine-assignation-reminder mb-3">
      <i class="pi pi-building"></i>
      <span>L'utilisateur sera assigné à : <strong>{{ usine.nom }}</strong></span>
    </div>
  }

  <div class="edit-content">
    @if (!usineContext.isConsolidated()) {
      <div class="mb-4">
        <label for="new-user-organisation" class="block text-sm font-medium text-gray-700 mb-2">
          Agence <span class="text-red-500">*</span>
        </label>
        <p-select
          id="new-user-organisation"
          name="new-user-organisation"
          [(ngModel)]="selectedOrganisationId"
          [options]="organisationOptions"
          optionLabel="label"
          optionValue="value"
          [appendTo]="'body'"
          [disabled]="organisationSelectionDisabled"
          placeholder="Selectionner une agence"
          styleClass="w-full"
        ></p-select>
        <small class="text-red-500 block mt-2" *ngIf="organisationOptions.length === 0">
          Aucune agence disponible.
        </small>
      </div>
    }

    <app-utilisateurs-form
      [mode]="'create'"
      [loading]="loading"
      [formDisabled]="usineContext.isConsolidated()"
      (submitForm)="onSubmit($event)"
      (cancel)="onCancel()"
    ></app-utilisateurs-form>
  </div>
</div>
